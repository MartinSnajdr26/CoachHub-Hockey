<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0e1116">
  <title>Offline · CoachHub Hockey</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(180deg, #0e1116, #0a0c10); color: #e7e9ee;
      font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif; text-align: center; padding: 24px;
    }
    .card {
      max-width: 420px; width: 100%; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 18px; padding: 32px 26px;
    }
    .logo { width: 84px; height: 84px; border-radius: 18px; margin: 0 auto 18px; display: block; }
    h1 { font-size: 1.35rem; margin: 0 0 6px; color: #d4c76f; letter-spacing: 0.01em; }
    .sub { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.14em; color: #8a8f99; margin-bottom: 18px; }
    p { color: #b6bac3; line-height: 1.55; margin: 0 0 22px; }
    button {
      font: inherit; font-weight: 700; cursor: pointer; padding: 12px 22px; border-radius: 12px;
      border: 0; background: #d4c76f; color: #1a1606;
    }
    button:hover { filter: brightness(1.05); }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="/static/icon-192.png" alt="CoachHub Hockey">
    <h1>CoachHub Hockey</h1>
    <div class="sub">Team Management Platform</div>
    <p><strong>Jsi offline.</strong><br>Zkontroluj připojení a zkus to znovu.</p>
    <button type="button" onclick="location.reload()">Zkusit znovu</button>
  </div>
</body>
</html>
